<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aprender Jugando</title>
<style>

* {
  user-select: none;
  -webkit-user-select: none;
  box-sizing: border-box;
}

body {
  font-family: 'Comic Sans MS', cursive;
  background: linear-gradient(160deg, #8ed6ff 0%, #ffffff 100%);
  min-height: 100vh;
  text-align: center;
  margin: 0;
  padding-bottom: 40px;
}

h1 {
  font-size: 42px;
  color: #ff5722;
  text-shadow: 3px 3px #ffd54f;
  margin-top: 10px;
}

#estrellas {
  font-size: 30px;
  margin-top: 5px;
}

/* menú */
.menu button {
  font-size: 26px;
  padding: 18px 35px;
  margin: 10px;
  border: none;
  border-radius: 30px;
  background: #ff9800;
  color: white;
  box-shadow: 0 6px 15px rgba(0,0,0,0.3);
  cursor: pointer;
  transition: transform 0.1s;
}

.menu button:active {
  transform: scale(1.1);
}

/* secciones */
.seccion {
  display: none;
  padding: 20px;
}

.contenedor {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

/* tarjetas */
.tarjeta {
  width: 150px;
  min-height: 190px;
  border-radius: 30px;
  padding: 16px 12px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.tarjeta:active {
  transform: scale(1.2) rotate(-5deg);
}

/* FIX: feedback visual al errar — tarjeta se agita */
@keyframes agitar {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px) rotate(-3deg); }
  40% { transform: translateX(8px) rotate(3deg); }
  60% { transform: translateX(-6px) rotate(-2deg); }
  80% { transform: translateX(6px) rotate(2deg); }
}

.tarjeta.error-anim {
  animation: agitar 0.4s ease;
}

.letra {
  font-size: 78px;
  font-weight: bold;
  line-height: 1;
  /* letras con borde blanco para hacerlas más infantiles */
  -webkit-text-stroke: 2px rgba(255,255,255,0.6);
  text-shadow: 3px 3px 0px rgba(0,0,0,0.15);
}

.letra-mayus {
  font-size: 38px;
  font-weight: bold;
  opacity: 0.55;
  line-height: 1;
  margin-top: -4px;
}

.palabra {
  font-size: 16px;
  font-weight: bold;
  color: rgba(0,0,0,0.6);
  margin-top: 6px;
  line-height: 1.3;
}

.de-palabra {
  font-size: 13px;
  color: rgba(0,0,0,0.45);
  font-style: italic;
  margin-top: 2px;
}

.emoji {
  font-size: 40px;
  margin-top: 4px;
}

/* tarjeta de número: temática espacial */
.tarjeta-num {
  width: 150px;
  min-height: 210px;
  border-radius: 22px;
  padding: 12px 10px 10px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  border: 3px solid rgba(255,255,255,0.25);
  position: relative;
  background: #1a1a3e !important; /* fondo espacio oscuro */
  overflow: hidden;
}

/* estrellas decorativas de fondo */
.tarjeta-num::before {
  content: '✦ · ✦ · · ✦ · ✦ · ✦ · · ✦';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  font-size: 8px;
  color: rgba(255,255,255,0.25);
  letter-spacing: 6px;
  line-height: 18px;
  word-break: break-all;
  overflow: hidden;
  padding: 4px;
  pointer-events: none;
}

.tarjeta-num:active {
  transform: scale(1.12) rotate(-3deg);
}

.tarjeta-num.error-anim {
  animation: agitar 0.4s ease;
}

/* fila superior: número grande + nombre */
.num-header {
  display: flex;
  align-items: baseline;
  gap: 5px;
  width: 100%;
  position: relative;
  z-index: 1;
}

.num-cifra {
  font-size: 52px;
  font-weight: bold;
  color: #ffe066;
  text-shadow: 0 0 10px rgba(255,220,0,0.6), 3px 3px 0 rgba(0,0,0,0.4);
  line-height: 1;
}

.num-nombre {
  font-size: 18px;
  font-weight: bold;
  color: #aad4ff;
  text-shadow: 0 0 6px rgba(100,180,255,0.5);
  line-height: 1;
}

/* área de naves */
.naves {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 5px;
  flex: 1;
  width: 100%;
  padding: 6px 4px;
  position: relative;
  z-index: 1;
}

.naves svg {
  flex-shrink: 0;
}

/* ====== ANIMALES ====== */
.tarjeta-animal {
  width: 145px;
  min-height: 195px;
  border-radius: 28px;
  padding: 14px 10px 12px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 8px 20px rgba(0,0,0,0.22);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  border: 4px solid rgba(255,255,255,0.55);
}

.tarjeta-animal:active {
  transform: scale(1.18) rotate(-4deg);
}

.tarjeta-animal.error-anim {
  animation: agitar 0.4s ease;
}

.animal-svg {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
}

.animal-svg svg {
  filter: drop-shadow(2px 3px 3px rgba(0,0,0,0.18));
}

.animal-nombre {
  font-size: 18px;
  font-weight: bold;
  color: white;
  text-shadow: 1px 2px 0 rgba(0,0,0,0.25);
  margin-top: 6px;
}

.animal-sonido {
  font-size: 13px;
  color: rgba(255,255,255,0.85);
  font-style: italic;
  margin-top: 2px;
}
.juegoBtn {
  margin-top: 25px;
  font-size: 28px;
  padding: 16px 40px;
  border: none;
  border-radius: 40px;
  background: #ff4081;
  color: white;
  cursor: pointer;
  box-shadow: 0 6px 12px rgba(0,0,0,0.3);
  transition: transform 0.1s, opacity 0.2s;
}

.juegoBtn:active {
  transform: scale(1.1);
}

/* FIX: estado deshabilitado del botón mientras hay juego activo */
.juegoBtn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

#mensaje {
  font-size: 30px;
  margin-top: 15px;
  font-weight: bold;
  min-height: 44px;
  transition: color 0.3s;
}

/* confeti */
.confeti {
  position: fixed;
  width: 8px;
  height: 14px;
  top: -20px;
  animation: caer linear forwards;
  pointer-events: none;
  z-index: 9999;
}

@keyframes caer {
  0%   { transform: translateY(0) rotate(0); }
  100% { transform: translateY(100vh) rotate(720deg); }
}

/* FIX: alerta de speech no disponible */
#alertaSpeech {
  display: none;
  background: #fff3cd;
  border: 2px solid #ffc107;
  border-radius: 20px;
  padding: 10px 20px;
  margin: 10px auto;
  max-width: 400px;
  font-size: 16px;
  color: #856404;
}

</style>
</head>
